<!-- ナビ -->

<nav class="nav">

class="nav-item">


<img

<span>
ホーム

<a

投稿

<a

<img

<section>


<h2>
目撃情報を投稿
</h2>




<label>

目撃日時

<span class="required">
必須
</span>

</label>


<br>


<input
type="datetime-local"
id="date">


<br><br>




<label>

頭数

<span class="required">
必須
</span>

</label>


<br>


<input

type="number"

id="cat-count"

min="1"

value="1">


<br><br>





<h3>

猫の柄

<span class="required">
必須
</span>

</h3>





<div class="cat-patterns">



<button
class="pattern-btn"
data-pattern="黒">

<img src="assets/pins/pin-icon-black.jpeg">

<span>
黒
</span>

</button>



<button
class="pattern-btn"
data-pattern="灰">


<img src="assets/pins/pin-icon-gray.jpeg">

<span>
灰
</span>

</button>



<button
class="pattern-btn"
data-pattern="白">


<img src="assets/pins/pin-icon-white.jpeg">

<span>
白
</span>

</button>



<button
class="pattern-btn"
data-pattern="茶">


<img src="assets/pins/pin-icon-cha.jpeg">

<span>
茶
</span>

</button>



<button
class="pattern-btn"
data-pattern="三毛">


<img src="assets/pins/pin-icon-mike.jpeg">

<span>
三毛
</span>

</button>



<button
class="pattern-btn"
data-pattern="キジ・サバ">


<img src="assets/pins/pin-icon-kijitora.jpeg">

<span>
キジ・サバ
</span>

</button>



<button
class="pattern-btn"
data-pattern="白黒">


<img src="assets/pins/pin-icon-sirokuro.jpeg">

<span>
白黒
</span>

</button>



<button
class="pattern-btn"
data-pattern="サビ">


<img src="assets/pins/pin-icon-sabi.jpeg">

<span>
サビ
</span>

</button>



<button
class="pattern-btn"
data-pattern="その他">


<img src="assets/pins/pin-icon-sonota.jpeg">

<span>
その他
</span>

</button>



<button
class="pattern-btn"
data-pattern="不明">


<img src="assets/pins/pin-icon-humei.jpeg">

<span>
不明
</span>

</button>



</div>





<h3>
登録した猫
</h3>


<div id="selected-cats">

</div>




<!-- 場所 -->

<h3>

場所

<span class="required">
必須
</span>

</h3>


<button
type="button"
id="gps-btn">

現在地を取得

</button>


<p id="location-result">

現在地：未取得

</p>



<div id="map">

</div>






<!-- コメント -->


<label>

コメント

<span class="optional">
任意
</span>

</label>


<br>


<textarea

id="comment"

maxlength="100"

rows="4"

cols="40">

</textarea>





<br><br>




<label>

<input

type="checkbox"

id="agree">


投稿内容が公開されることに同意します

</label>





<br><br>




<button

id="post-btn"

class="big-post-btn">


投稿する


</button>





</section>







<!-- 投稿完了 -->

<div
id="success-modal">


<div class="modal-box">


<h2>

✓ 投稿しました

</h2>


<p>

ご協力ありがとうございます

</p>


<button id="close-modal">

閉じる

</button>


</div>


</div>






<footer>


<p>

九大ねこマップ

</p>


<p>

</p>


</footer>
