<section>

<h2>

猫目撃マップ

</h2>

<div class="filter-box">

<h3>

絞り込み

</h3>





<label>
期間
</label>

<br>

<select id="date-filter">

<option value="all">
全期間
</option>

<option value="7">
過去7日
</option>

<option value="30">
過去30日
</option>

<option value="90">
過去90日
</option>

</select>

<br><br>







<label>

柄

</label>

<br>

<select id="pattern-filter">

<option value="all">
すべて
</option>

<option value="黒">
黒
</option>

<option value="灰">
灰
</option>

<option value="白">
白
</option>

<option value="茶">
茶
</option>

<option value="三毛">
三毛
</option>

<option value="キジ・サバ">
キジ・サバ
</option>

<option value="白黒">
白黒
</option>

<option value="サビ">
サビ
</option>

<option value="その他">
その他
</option>

<option value="不明">
不明
</option>

</select>

<br><br>



<label>

さくらカット

</label>

<br>

<select id="sakura-filter">

<option value="all">
すべて
</option>

<option value="あり">
あり
</option>

<option value="なし">
なし
</option>

<option value="不明">
不明
</option>

</select>

<br><br>



<label>

特徴

</label>

<br>

<select id="feature-filter">

<option value="all">
すべて
</option>

<option value="くつした">
くつした
</option>

<option value="白いお腹">
白いお腹
</option>

<option value="縞">
縞
</option>

<option value="長毛">
長毛
</option>

<option value="かぎしっぽ">
かぎしっぽ
</option>

<option value="首輪">
首輪
</option>

</select>

<br><br>




<button id="apply-filter">

絞り込み

</button>

<button id="reset-filter">

リセット

</button>
